# Copy to repo root as `docker-compose.override.yml` on your VPS (do not commit secrets).
# Docker Compose loads this file automatically next to docker-compose.yml.
#
# Use with: docker compose -f docker-compose.yml -f deploy/production/compose.yml up -d
# (override.yml is still merged automatically when present in the project directory.)
#
# Before starting nginx with 443, install certs, e.g.:
#   sudo apt install certbot
#   sudo systemctl stop nginx   # if any host nginx uses 80
#   sudo certbot certonly --standalone -d yourdomain.com -d www.yourdomain.com
#
# Replace deploy/production/nginx/default.conf with the contents of
# deploy/hostinger/nginx/default-https.conf.example (edit server_name + paths).

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/production/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
